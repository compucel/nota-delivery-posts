name: Publish Next Instagram Post
on:
  schedule:
    - cron: '0 10 1-30 4 *'
    - cron: '0 11 1-30 4 *'
    - cron: '0 12 1-30 4 *'
    - cron: '0 13 1-30 4 *'
    - cron: '0 14 1-30 4 *'
    - cron: '0 15 1-30 4 *'
    - cron: '0 16 1-30 4 *'
    - cron: '0 17 1-30 4 *'
    - cron: '0 18 1-30 4 *'
    - cron: '0 19 1-30 4 *'
    - cron: '0 20 1-30 4 *'
    - cron: '0 21 1-30 4 *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine day and next post
        id: info
        run: |
          DAY=$(date -u -d '-3 hours' '+%d')
          MONTH=$(date -u -d '-3 hours' '+%m')
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "month=$MONTH" >> $GITHUB_OUTPUT

          if [ "$MONTH" != "04" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Não estamos em abril."
            exit 0
          fi

          LOG="abril-2026/published-log.json"
          if [ ! -f "$LOG" ] || [ "$(cat $LOG)" = "{}" ]; then
            NEXT=1
          else
            COUNT=$(jq -r ".\"2026-04-$DAY\" | length // 0" "$LOG")
            NEXT=$(($COUNT + 1))
          fi

          if [ "$NEXT" -gt 12 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Todos os 12 posts do dia $DAY publicados!"
            exit 0
          fi

          POST_NUM=$(printf '%02d' $NEXT)
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "post_num=$POST_NUM" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Próximo: post-$POST_NUM do dia-$DAY"

      - name: Read caption
        if: steps.info.outputs.skip != 'true'
        id: caption
        run: |
          DAY=${{ steps.info.outputs.day }}
          POST_NUM=${{ steps.info.outputs.post_num }}
          CAPTION=$(jq -r ".\"dia-${DAY}\".\"post-${POST_NUM}\"" abril-2026/captions.json)
          if [ "$CAPTION" = "null" ] || [ -z "$CAPTION" ]; then
            CAPTION="Nota Delivery - Simplifique sua gestao! Teste 7 dias gratis - link na bio #notadelivery #delivery #gestao #restaurante"
          fi
          echo "$CAPTION" > /tmp/caption.txt

      - name: Publish post
        if: steps.info.outputs.skip != 'true'
        id: publish
        env:
          PAGE_TOKEN: ${{ secrets.PAGE_TOKEN }}
        run: |
          DAY=${{ steps.info.outputs.day }}
          POST_NUM=${{ steps.info.outputs.post_num }}
          NEXT=${{ steps.info.outputs.next }}
          CAPTION=$(cat /tmp/caption.txt)
          IG_ID="17841453200002524"

          IS_CAROUSEL=false
          if [ $((NEXT % 2)) -eq 0 ]; then
            SLIDES=$(ls abril-2026/dia-${DAY}/post-${POST_NUM}-slide-*.png 2>/dev/null | wc -l)
            if [ "$SLIDES" -ge 2 ]; then
              IS_CAROUSEL=true
            fi
          fi

          if [ "$IS_CAROUSEL" = "true" ]; then
            echo "=== CARROSSEL com $SLIDES slides ==="
            CHILDREN=""
            for SLIDE in abril-2026/dia-${DAY}/post-${POST_NUM}-slide-*.png; do
              SLIDE_NAME=$(basename "$SLIDE")
              SLIDE_URL="https://raw.githubusercontent.com/compucel/nota-delivery-posts/main/abril-2026/dia-${DAY}/${SLIDE_NAME}"
              echo "Upload slide: $SLIDE_URL"
              CHILD=$(curl -s -X POST "https://graph.facebook.com/v21.0/${IG_ID}/media" \
                --data-urlencode "image_url=${SLIDE_URL}" \
                -d "is_carousel_item=true" \
                -d "access_token=${PAGE_TOKEN}" | jq -r '.id')
              echo "Child ID: $CHILD"
              if [ -n "$CHILDREN" ]; then CHILDREN="${CHILDREN},${CHILD}"; else CHILDREN="$CHILD"; fi
              sleep 3
            done

            echo "Criando carousel container..."
            CAR_RESPONSE=$(curl -s -X POST "https://graph.facebook.com/v21.0/${IG_ID}/media" \
              -d "media_type=CAROUSEL" \
              -d "children=${CHILDREN}" \
              --data-urlencode "caption=${CAPTION}" \
              -d "access_token=${PAGE_TOKEN}")
            CONTAINER_ID=$(echo "$CAR_RESPONSE" | jq -r '.id')
            echo "Carousel container: $CONTAINER_ID"

            if [ "$CONTAINER_ID" = "null" ] || [ -z "$CONTAINER_ID" ]; then
              echo "ERRO carousel: $CAR_RESPONSE"
              exit 1
            fi
          else
            echo "=== POST ESTÁTICO ==="
            IMAGE_URL="https://raw.githubusercontent.com/compucel/nota-delivery-posts/main/abril-2026/dia-${DAY}/post-${POST_NUM}.png"
            echo "Image: $IMAGE_URL"
            RESPONSE=$(curl -s -X POST "https://graph.facebook.com/v21.0/${IG_ID}/media" \
              --data-urlencode "image_url=${IMAGE_URL}" \
              --data-urlencode "caption=${CAPTION}" \
              -d "access_token=${PAGE_TOKEN}")
            CONTAINER_ID=$(echo "$RESPONSE" | jq -r '.id')
            echo "Container: $CONTAINER_ID"

            if [ "$CONTAINER_ID" = "null" ] || [ -z "$CONTAINER_ID" ]; then
              echo "ERRO: $RESPONSE"
              exit 1
            fi
          fi

          echo "Aguardando processamento..."
          sleep 10

          echo "Publicando..."
          PUB=$(curl -s -X POST "https://graph.facebook.com/v21.0/${IG_ID}/media_publish" \
            -d "creation_id=${CONTAINER_ID}" \
            -d "access_token=${PAGE_TOKEN}")
          MEDIA_ID=$(echo "$PUB" | jq -r '.id')
          echo "media_id=$MEDIA_ID" >> $GITHUB_OUTPUT

          if [ "$MEDIA_ID" = "null" ] || [ -z "$MEDIA_ID" ]; then
            echo "ERRO ao publicar: $PUB"
            exit 1
          fi

          echo "PUBLICADO! Media ID: $MEDIA_ID"

      - name: Update log and push
        if: steps.info.outputs.skip != 'true'
        run: |
          DAY=${{ steps.info.outputs.day }}
          NEXT=${{ steps.info.outputs.next }}
          POST_NUM=${{ steps.info.outputs.post_num }}
          MEDIA_ID=${{ steps.publish.outputs.media_id }}
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq --arg day "2026-04-${DAY}" \
             --arg post "$NEXT" \
             --arg media "$MEDIA_ID" \
             --arg time "$NOW" \
             '.[$day] += [{"post": ($post|tonumber), "mediaId": $media, "publishedAt": $time}]' \
             abril-2026/published-log.json > tmp.json && mv tmp.json abril-2026/published-log.json

          cat abril-2026/published-log.json

          git config user.name "nota-delivery-bot"
          git config user.email "bot@notadelivery.com"
          git add abril-2026/published-log.json
          git commit -m "post-${POST_NUM} dia-${DAY} publicado (Media: ${MEDIA_ID})"
          git push
