name: Publish Instagram Posts

on:
  schedule:
    - cron: '0 11 1-30 4 *'
    - cron: '0 12 1-30 4 *'
    - cron: '0 13 1-30 4 *'
    - cron: '0 14 1-30 4 *'
    - cron: '0 15 1-30 4 *'
    - cron: '0 16 1-30 4 *'
    - cron: '0 17 1-30 4 *'
    - cron: '0 18 1-30 4 *'
    - cron: '0 19 1-30 4 *'
    - cron: '0 20 1-30 4 *'
    - cron: '0 21 1-30 4 *'
    - cron: '0 22 1-30 4 *'
  workflow_dispatch:
    inputs:
      day:
        description: 'Dia (formato DD, ex: 01). Deixe vazio para usar o dia atual (BRT).'
        required: false
        default: ''
      post:
        description: 'Número do post (formato DD, ex: 01). Deixe vazio para usar o próximo não publicado.'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine day and post
        id: calc
        run: |
          export TZ='America/Sao_Paulo'
          MONTH=$(date +%-m)
          DAY_NUM=$(date +%-d)

          # Override with inputs if provided
          if [ -n "${{ github.event.inputs.day }}" ]; then
            DAY_PAD="${{ github.event.inputs.day }}"
          else
            if [ "$MONTH" != "4" ]; then
              echo "Não estamos em abril. Saindo."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            DAY_PAD=$(printf "%02d" $DAY_NUM)
          fi

          if [ -n "${{ github.event.inputs.post }}" ]; then
            POST_PAD="${{ github.event.inputs.post }}"
            echo "day=$DAY_PAD" >> $GITHUB_OUTPUT
            echo "post=$POST_PAD" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Usando input manual: dia-${DAY_PAD}/post-${POST_PAD}"
            exit 0
          fi

          # Determine next post from published-log.json
          DATE_KEY="2026-04-${DAY_PAD}"
          PUBLISHED_COUNT=0
          if [ -f "abril-2026/published-log.json" ]; then
            PUBLISHED_COUNT=$(python3 -c "
import json, sys
try:
    with open('abril-2026/published-log.json') as f:
        data = json.load(f)
    posts = data.get('${DATE_KEY}', [])
    print(len(posts))
except:
    print(0)
")
          fi

          echo "Posts já publicados hoje: $PUBLISHED_COUNT"

          if [ "$PUBLISHED_COUNT" -ge 12 ]; then
            echo "Todos os 12 posts do dia já foram publicados."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          POST_NUM=$((PUBLISHED_COUNT + 1))
          POST_PAD=$(printf "%02d" $POST_NUM)

          echo "day=$DAY_PAD" >> $GITHUB_OUTPUT
          echo "post=$POST_PAD" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Próximo post: dia-${DAY_PAD}/post-${POST_PAD}"

      - name: Publish post
        id: publish_step
        if: steps.calc.outputs.skip == 'false'
        env:
          TOKEN: ${{ secrets.META_PAGE_TOKEN }}
        run: |
          DAY="${{ steps.calc.outputs.day }}"
          POST="${{ steps.calc.outputs.post }}"
          IG_ID="17841453200002524"
          IMG_FILE="abril-2026/dia-${DAY}/post-${POST}.png"

          if [ ! -f "$IMG_FILE" ]; then
            echo "ERRO: Arquivo não encontrado: $IMG_FILE"
            exit 1
          fi

          IMG="https://raw.githubusercontent.com/${{ github.repository }}/main/${IMG_FILE}"

          # Read caption from captions.json
          CAP=$(python3 -c "
import json
try:
    with open('abril-2026/captions.json') as f:
        data = json.load(f)
    cap = data.get('dia-${DAY}', {}).get('post-${POST}', '')
    print(cap)
except Exception as e:
    print('')
" 2>/dev/null)

          if [ -z "$CAP" ]; then
            CAP="🍕 Nota Delivery — Simplifique sua gestão! Teste 7 dias grátis — link na bio #notadelivery #delivery #gestao #restaurante"
          fi

          echo "Imagem: $IMG"
          echo "Caption (primeiros 80 chars): ${CAP:0:80}..."

          # Create container
          RES=$(curl -s -X POST "https://graph.facebook.com/v21.0/${IG_ID}/media" \
            --data-urlencode "image_url=${IMG}" \
            --data-urlencode "caption=${CAP}" \
            -d "access_token=${TOKEN}")
          echo "Container response: $RES"

          CID=$(echo "$RES" | python3 -c "import sys,json;print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
          if [ -z "$CID" ] || [ "$CID" = "None" ]; then
            echo "ERRO ao criar container: $RES"
            exit 1
          fi
          echo "Container ID: $CID"

          # Wait for processing
          sleep 10

          # Publish
          PUB=$(curl -s -X POST "https://graph.facebook.com/v21.0/${IG_ID}/media_publish" \
            -d "creation_id=${CID}" \
            -d "access_token=${TOKEN}")
          echo "Publish response: $PUB"

          MEDIA_ID=$(echo "$PUB" | python3 -c "import sys,json;print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
          if [ -z "$MEDIA_ID" ] || [ "$MEDIA_ID" = "None" ]; then
            echo "ERRO ao publicar: $PUB"
            exit 1
          fi

          echo "✅ PUBLICADO! Media ID: $MEDIA_ID"
          echo "media_id=$MEDIA_ID" >> $GITHUB_OUTPUT

      - name: Update published log and push
        if: steps.calc.outputs.skip == 'false' && steps.publish_step.outputs.media_id != ''
        run: |
          DAY="${{ steps.calc.outputs.day }}"
          POST="${{ steps.calc.outputs.post }}"
          MEDIA_ID="${{ steps.publish_step.outputs.media_id }}"

          python3 -c "
import json, datetime

log_file = 'abril-2026/published-log.json'
try:
    with open(log_file) as f:
        data = json.load(f)
except:
    data = {}

date_key = '2026-04-${DAY}'
if date_key not in data:
    data[date_key] = []

data[date_key].append({
    'post': int('${POST}'),
    'mediaId': '${MEDIA_ID}',
    'publishedAt': datetime.datetime.utcnow().isoformat() + 'Z'
})

count = len(data[date_key])
with open(log_file, 'w') as f:
    json.dump(data, f, indent=2, ensure_ascii=False)
print(f'Log atualizado: {count}/12 posts publicados em 2026-04-${DAY}')
"

          git config user.email 'actions@github.com'
          git config user.name 'GitHub Actions'
          git add abril-2026/published-log.json
          git commit -m "chore: published dia-${DAY}/post-${POST} [skip ci]"
          git push
          echo "✅ Log atualizado e push realizado."
